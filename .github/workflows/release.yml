name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── macOS DMG ────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release -p rusty-bridge-ui

      - name: Create .icns
        run: |
          mkdir -p /tmp/rb.iconset
          for sz in 16 32 64 128 256 512; do
            sips -z $sz $sz ui/resources/rb128.png \
              --out /tmp/rb.iconset/icon_${sz}x${sz}.png 2>/dev/null || true
            sips -z $((sz*2)) $((sz*2)) ui/resources/rb128.png \
              --out /tmp/rb.iconset/icon_${sz}x${sz}@2x.png 2>/dev/null || true
          done
          iconutil -c icns /tmp/rb.iconset -o ui/resources/rb.icns || true

      - name: Bundle .app
        run: |
          APP=dist/out/RustyBridge.app
          mkdir -p $APP/Contents/MacOS $APP/Contents/Resources
          cp target/release/rusty-bridge-ui $APP/Contents/MacOS/RustyBridge
          [ -f ui/resources/rb.icns ] && cp ui/resources/rb.icns $APP/Contents/Resources/AppIcon.icns
          VERSION=$(grep '^version' ui/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          cat > $APP/Contents/Info.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleIdentifier</key>         <string>com.lakomoor.rustybridger</string>
            <key>CFBundleName</key>               <string>RustyBridger</string>
            <key>CFBundleDisplayName</key>        <string>Rusty Bridger</string>
            <key>CFBundleExecutable</key>         <string>RustyBridge</string>
            <key>CFBundleIconFile</key>           <string>AppIcon</string>
            <key>CFBundleVersion</key>            <string>$VERSION</string>
            <key>CFBundleShortVersionString</key> <string>$VERSION</string>
            <key>CFBundlePackageType</key>        <string>APPL</string>
            <key>NSCameraUsageDescription</key>   <string>Face tracking via webcam</string>
            <key>NSHighResolutionCapable</key>    <true/>
            <key>LSMinimumSystemVersion</key>     <string>11.0</string>
          </dict></plist>
          PLIST
          codesign --force --deep --sign - $APP
          /usr/bin/xattr -cr $APP

      - name: Create DMG
        run: |
          VERSION=$(grep '^version' ui/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          mkdir -p dist/out/.staging
          cp -R dist/out/RustyBridge.app dist/out/.staging/
          ln -s /Applications dist/out/.staging/Applications
          hdiutil create -volname "RustyBridger" \
            -srcfolder dist/out/.staging \
            -ov -format UDZO \
            "dist/out/RustyBridger-${VERSION}-macos.dmg"
          rm -rf dist/out/.staging

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/out/RustyBridger-*-macos.dmg

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/out

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/out/**/*.dmg
