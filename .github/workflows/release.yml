name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── macOS DMG ──────────────────────────────────────────────────────────────
  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build release
        run: cargo build --release -p rusty-bridge-ui

      - name: Create .icns
        run: |
          mkdir -p /tmp/rb.iconset
          for sz in 16 32 64 128 256 512; do
            sips -z $sz $sz ui/resources/rb128.png \
              --out /tmp/rb.iconset/icon_${sz}x${sz}.png 2>/dev/null || true
            sips -z $((sz*2)) $((sz*2)) ui/resources/rb128.png \
              --out /tmp/rb.iconset/icon_${sz}x${sz}@2x.png 2>/dev/null || true
          done
          iconutil -c icns /tmp/rb.iconset -o ui/resources/rb.icns || true

      - name: Bundle .app
        run: |
          APP=dist/out/RustyBridger.app
          mkdir -p $APP/Contents/MacOS $APP/Contents/Resources
          cp target/release/rusty-bridge-ui $APP/Contents/MacOS/RustyBridger
          [ -f ui/resources/rb.icns ] && cp ui/resources/rb.icns $APP/Contents/Resources/AppIcon.icns
          VERSION=$(grep '^version' ui/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          cat > $APP/Contents/Info.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleIdentifier</key>         <string>com.lakomoor.rustybridger</string>
            <key>CFBundleName</key>               <string>RustyBridger</string>
            <key>CFBundleDisplayName</key>        <string>Rusty Bridger</string>
            <key>CFBundleExecutable</key>         <string>RustyBridger</string>
            <key>CFBundleIconFile</key>           <string>AppIcon</string>
            <key>CFBundleVersion</key>            <string>$VERSION</string>
            <key>CFBundleShortVersionString</key> <string>$VERSION</string>
            <key>CFBundlePackageType</key>        <string>APPL</string>
            <key>NSHighResolutionCapable</key>    <true/>
            <key>LSMinimumSystemVersion</key>     <string>11.0</string>
          </dict></plist>
          PLIST
          codesign --force --deep --sign - $APP
          /usr/bin/xattr -cr $APP

      - name: Create DMG
        run: |
          VERSION=$(grep '^version' ui/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          mkdir -p dist/out/.staging
          cp -R dist/out/RustyBridger.app dist/out/.staging/
          ln -s /Applications dist/out/.staging/Applications
          hdiutil create -volname "RustyBridger" \
            -srcfolder dist/out/.staging \
            -ov -format UDZO \
            "dist/out/RustyBridger-${VERSION}-macos.dmg"
          rm -rf dist/out/.staging

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/out/RustyBridger-*-macos.dmg

  # ── Linux DEB ──────────────────────────────────────────────────────────────
  build-linux:
    name: Linux DEB
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            dpkg-dev

      - name: Build release
        run: cargo build --release -p rusty-bridge-ui

      - name: Create DEB package
        run: SKIP_BUILD=1 bash dist/linux/build_deb.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/out/*.deb

  # ── Windows EXE ────────────────────────────────────────────────────────────
  build-windows:
    name: Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build release
        run: cargo build --release -p rusty-bridge-ui

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Create installer
        shell: cmd
        run: |
          mkdir dist\out 2>nul
          cd dist\windows
          makensis installer.nsi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/out/RustyBridger-*-windows-setup.exe

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/out

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/out/**/*.dmg
            dist/out/**/*.deb
            dist/out/**/*.exe
